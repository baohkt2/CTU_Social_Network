# ============================================
# Auth Service - Cloud Profile
# DB: Neon PostgreSQL #1 (ep-floral-star)
# Redis: Upstash Global (concrete-corgi)
# Kafka: Local Docker
# ============================================

server.port=8080
spring.application.name=auth-service

# Mail configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Redis Configuration - Upstash Cloud (SSL/TLS)
spring.data.redis.host=${GLOBAL_REDIS_HOST}
spring.data.redis.port=${GLOBAL_REDIS_PORT}
spring.data.redis.password=${GLOBAL_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# Database Configuration - Neon PostgreSQL Cloud
spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USER}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Cloud optimized connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Allow bean definition overriding
spring.main.allow-bean-definition-overriding=true

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Actuator for health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Security Configuration
spring.security.enabled=true

# JWT Configuration
jwt.secret=${JWT_SECRET:change_this_secret_in_production}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
jwt.expiration.ms=86400000
jwt.refresh.expiration.ms=604800000

# Kafka Configuration - Local Docker
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
spring.kafka.consumer.group-id=auth-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Kafka API version compatibility
spring.kafka.consumer.properties.fetch.min.bytes=1
spring.kafka.consumer.properties.max.poll.records=500
spring.kafka.consumer.properties.session.timeout.ms=30000
spring.kafka.consumer.properties.heartbeat.interval.ms=3000

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=1

# reCAPTCHA Configuration
recaptcha.secret.key=${RECAPTCHA_SECRET_KEY:}
recaptcha.verify.url=https://www.google.com/recaptcha/api/siteverify
