name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── shared-security must be built first; all services depend on it ──────────
  shared-security:
    name: Build shared-security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & install shared-security
        run: mvn -f shared-security/pom.xml install -DskipTests --no-transfer-progress

      - name: Cache shared-security jar
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/vn/ctu/edu/shared-security
          key: shared-security-${{ github.sha }}

  # ── Java microservices (matrix) ─────────────────────────────────────────────
  java-services:
    name: Build & test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: shared-security

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - post-service
          - chat-service
          - media-service
          - api-gateway
          - eureka-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Restore shared-security jar
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/vn/ctu/edu/shared-security
          key: shared-security-${{ github.sha }}

      - name: Build & test ${{ matrix.service }}
        run: mvn -f ${{ matrix.service }}/pom.xml verify --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/
          if-no-files-found: ignore

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Build & test ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - client-frontend
          - admin-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix ${{ matrix.app }}

      - name: Lint
        run: npm run lint --prefix ${{ matrix.app }}
        continue-on-error: true

      - name: Test
        run: npm test --prefix ${{ matrix.app }} -- --passWithNoTests
        continue-on-error: true

      - name: Build
        run: npm run build --prefix ${{ matrix.app }}
        env:
          # Provide dummy values so Next.js build doesn't fail on missing env vars
          NEXT_PUBLIC_API_URL: http://localhost:8090
          NEXT_PUBLIC_WS_URL: ws://localhost:8086

  # ── Python ML service ────────────────────────────────────────────────────────
  python-model:
    name: Lint & test Python model service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: recommend-service/python-model/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r recommend-service/python-model/requirements.txt
        continue-on-error: true

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 recommend-service/python-model --max-line-length=120 --exclude=venv,__pycache__
        continue-on-error: true

  # ── Security scan ────────────────────────────────────────────────────────────
  security-scan:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    # Run on PRs and main pushes; don't block the matrix jobs
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'          # Report findings but don't fail the build yet
          severity: CRITICAL,HIGH
          ignore-unfixed: true
