name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  java:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - eureka-server
          - api-gateway
          - auth-service
          - user-service
          - post-service
          - chat-service
          - media-service
          - recommend-service/java-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Maven verify
        run: mvn -B -f "${{ matrix.module }}/pom.xml" verify

  client-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client-frontend/package-lock.json
      - run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:18090
          NEXT_PUBLIC_WS_URL: ws://localhost:18090/api/ws/chat
        run: npm run build
