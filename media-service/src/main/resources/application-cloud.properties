# ============================================
# Media Service - Cloud Profile
# DB: Neon PostgreSQL #2 (ep-ancient-tree)
# Kafka: Local Docker
# ============================================

spring.application.name=media-service
server.port=8084

# Database Configuration - Neon PostgreSQL Cloud
spring.datasource.url=${MEDIA_DB_URL}
spring.datasource.username=${MEDIA_DB_USER}
spring.datasource.password=${MEDIA_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Cloud optimized connection pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Kafka Configuration - Local Docker
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Eureka Configuration
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.hostname=media-service
eureka.instance.prefer-ip-address=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.vn.ctu.edu.mediaservice=DEBUG
logging.level.org.springframework.kafka=INFO
