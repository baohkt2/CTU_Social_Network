# ============================================
# Chat Service - Cloud Profile
# DB: MongoDB Atlas (chat-db cluster)
# Redis: Upstash Global (concrete-corgi)
# Kafka: Local Docker
# ============================================

spring.application.name=chat-service
server.port=8086

# MongoDB Configuration - Atlas Cloud
# Use URI instead of host/port for mongodb+srv:// connection
spring.data.mongodb.uri=${CHAT_MONGODB_URI}
spring.data.mongodb.database=chat_db

# Redis Configuration - Upstash Cloud (SSL/TLS)
spring.data.redis.host=${GLOBAL_REDIS_HOST}
spring.data.redis.port=${GLOBAL_REDIS_PORT}
spring.data.redis.password=${GLOBAL_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
spring.data.redis.timeout=60000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Kafka Configuration - Local Docker
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=chat-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true

# Eureka Configuration
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# JWT Configuration
jwt.secret=${JWT_SECRET:change_this_secret_in_production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# WebSocket Configuration
spring.websocket.allowed-origins=*

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.vn.ctu.edu.chatservice=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.springframework.web.socket=DEBUG
