# ============================================
# User Service - Cloud Profile
# DB: Neo4j Aura (1ff6623e)
# Redis: Upstash Global (concrete-corgi)
# Kafka: Local Docker
# ============================================

server.port=8081
spring.application.name=user-service

# Neo4j Configuration - Neo4j Aura Cloud (SSL via neo4j+s://)
spring.neo4j.uri=${NEO4J_URI}
spring.neo4j.authentication.username=${NEO4J_USERNAME}
spring.neo4j.authentication.password=${NEO4J_PASSWORD}

# Redis Configuration - Upstash Cloud (SSL/TLS)
spring.data.redis.host=${GLOBAL_REDIS_HOST}
spring.data.redis.port=${GLOBAL_REDIS_PORT}
spring.data.redis.password=${GLOBAL_REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
spring.data.redis.timeout=60000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Kafka Configuration - Local Docker
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Security Configuration
app.jwt.secret=${JWT_SECRET:change_this_secret_in_production}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Eureka Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.ctuconnect=INFO
logging.level.org.springframework.kafka=DEBUG

# Recommend Service Configuration (Docker)
recommend-service.url=${RECOMMEND_SERVICE_URL:http://recommendation-service:8095}
recommend-service.enabled=true
recommend-service.timeout-ms=5000

# Friend Recommendation Settings
recommendation.ml.enabled=true
recommendation.ml.fallback-enabled=true
